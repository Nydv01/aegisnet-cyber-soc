name: AegisNet CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ──
  backend-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Train ML Models
        run: python -m backend.scripts.train_models
        env:
          PYTHONPATH: .

      - name: Verify model artifacts exist
        run: |
          test -f backend/models/ids_model.joblib
          test -f backend/models/phishing_model.joblib
          test -f backend/models/defense_agent.json
          test -f backend/metrics/training_report.json
          echo "✅ All model artifacts verified"

      - name: Start backend server (smoke test)
        run: |
          PYTHONPATH=. uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/api/status
          echo "✅ Backend server smoke test passed"

  # ── Frontend Build ──
  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify build output
        run: |
          test -d frontend/dist
          test -f frontend/dist/index.html
          echo "✅ Frontend build verified"

  # ── Docker Build ──
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aegisnet:latest --target production .

      - name: Verify Docker image
        run: |
          docker run -d --name aegisnet-test -p 8000:8000 aegisnet:latest
          sleep 10
          curl -f http://localhost:8000/api/status
          docker stop aegisnet-test
          echo "✅ Docker image verified"
